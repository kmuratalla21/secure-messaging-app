<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=2">
</head>
<body>
    <h1>Welcome, {{ username }}!</h1>
    <p>Send encrypted messages below.</p>

    {% if message_status %}
        <p class="success">{{ message_status }}</p>
    {% endif %}

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST">
        <input type="text" name="receiver" placeholder="Receiver username" required>
        <textarea name="message" placeholder="Type your message here..." required></textarea>
        <button type="submit">Send Encrypted Message</button>
    </form>

    <a href="{{ url_for('inbox') }}">Go to Inbox</a>
    <a href="{{ url_for('logout') }}">Logout</a>
</body>
</html>
